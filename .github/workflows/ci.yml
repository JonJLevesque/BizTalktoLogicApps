name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]

jobs:
  build-and-test:
    name: Build & Test
    runs-on: ubuntu-latest

    strategy:
      matrix:
        node-version: [20.x]

    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node-version }}
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: TypeScript compile check
        run: npx tsc --noEmit

      - name: Run unit and integration tests
        run: npm test

      - name: Run golden-master tests
        run: node --experimental-vm-modules node_modules/.bin/jest tests/golden-master/

      - name: Run regression tests
        run: node --experimental-vm-modules node_modules/.bin/jest tests/regression/

      - name: Build
        run: npm run build
