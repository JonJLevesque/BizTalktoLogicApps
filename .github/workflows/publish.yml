# npm publish with automatic version bump and provenance attestation
#
# Usage: GitHub Actions UI → "Publish to npm" → Run workflow → pick bump type
#
# Required secrets:
#   NPM_TOKEN  — npm automation token (npmjs.com → Access Tokens → Automation)

name: Publish to npm

on:
  workflow_dispatch:
    inputs:
      bump:
        description: 'Version bump type'
        required: true
        default: 'patch'
        type: choice
        options:
          - patch
          - minor
          - major

permissions:
  contents: write   # push version commit + tag back to main
  id-token: write   # npm provenance (OIDC)

jobs:
  publish:
    name: Bump, build, and publish
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          registry-url: 'https://registry.npmjs.org'

      - name: Install dependencies
        run: npm ci

      - name: Type check
        run: npx tsc --noEmit

      - name: Run tests
        run: npm test

      - name: Configure git
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

      - name: Bump version
        id: bump
        env:
          BUMP: ${{ github.event.inputs.bump }}
        run: |
          NEW_VERSION=$(npm version "$BUMP" --no-git-tag-version)
          echo "version=$NEW_VERSION" >> "$GITHUB_OUTPUT"

      - name: Commit and tag
        env:
          NEW_VERSION: ${{ steps.bump.outputs.version }}
        run: |
          git add package.json package-lock.json
          git commit -m "$NEW_VERSION"
          git tag "$NEW_VERSION"
          git push origin main --tags

      - name: Publish with provenance
        run: npm publish --provenance --access public
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
